name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libarchive-dev pkg-config

      - name: Build
        run: make

      - name: Verify binary
        run: |
          ./rosie --version
          ./rosie help

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install curl libarchive pkg-config

      - name: Build
        run: |
          export PKG_CONFIG_PATH="$(brew --prefix libarchive)/lib/pkgconfig:$PKG_CONFIG_PATH"
          make

      - name: Verify binary
        run: |
          ./rosie --version
          ./rosie help
