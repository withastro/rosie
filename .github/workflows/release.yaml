name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true

      - name: Calculate source tarball SHA256
        id: sha256
        run: |
          # Wait for GitHub to generate the tarball
          sleep 5
          # Download the source tarball
          curl -sL "https://github.com/${{ github.repository }}/archive/refs/tags/v${{ steps.version.outputs.version }}.tar.gz" -o source.tar.gz
          # Calculate SHA256
          sha256=$(sha256sum source.tar.gz | cut -d' ' -f1)
          echo "sha256=$sha256" >> $GITHUB_OUTPUT
          echo "SHA256: $sha256"

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA256="${{ steps.sha256.outputs.sha256 }}"

          # Clone the tap repo
          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/matthewp/homebrew-rosie.git tap
          cd tap

          # Update the formula
          sed -i "s|url \"https://github.com/matthewp/rosie/archive/refs/tags/v.*\.tar\.gz\"|url \"https://github.com/matthewp/rosie/archive/refs/tags/v${VERSION}.tar.gz\"|" Formula/rosie.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Formula/rosie.rb

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/rosie.rb
          git commit -m "Update rosie to v${VERSION}"
          git push

      - name: Generate AUR PKGBUILD
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA256="${{ steps.sha256.outputs.sha256 }}"
          sed -e "s/\${VERSION}/$VERSION/g" -e "s/\${SHA256}/$SHA256/g" aur/PKGBUILD > aur/PKGBUILD.gen
          mv aur/PKGBUILD.gen aur/PKGBUILD
          cat aur/PKGBUILD

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3
        with:
          pkgname: rosie
          pkgbuild: ./aur/PKGBUILD
          commit_username: matthewp
          commit_email: matthew@matthewphillips.info
          ssh_private_key: ${{ secrets.AUR_SSH_KEY }}
          commit_message: "Update to v${{ steps.version.outputs.version }}"
