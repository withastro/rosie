name: Release

on:
  push:
    tags:
      - 'v*'

# Minimal default token permissions. Jobs that need to write (releases,
# gh-pages, npm OIDC) opt in explicitly via their own `permissions:` block.
permissions:
  contents: read

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      sha256: ${{ steps.sha256.outputs.sha256 }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v1
        with:
          generate_release_notes: true

      - name: Calculate source tarball SHA256
        id: sha256
        env:
          REPO: ${{ github.repository }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          sleep 5
          curl -sL "https://github.com/${REPO}/archive/refs/tags/v${VERSION}.tar.gz" -o source.tar.gz
          sha256=$(sha256sum source.tar.gz | cut -d' ' -f1)
          echo "sha256=$sha256" >> $GITHUB_OUTPUT
          echo "SHA256: $sha256"

  homebrew-and-aur:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Update Homebrew formula
        env:
          VERSION: ${{ needs.create-release.outputs.version }}
          SHA256: ${{ needs.create-release.outputs.sha256 }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/withastro/homebrew-rosie.git tap
          cd tap

          # Org-agnostic match so this also rewrites a formula still pointing at the old org.
          sed -i "s|url \"https://github.com/[^/]*/rosie/archive/refs/tags/v.*\.tar\.gz\"|url \"https://github.com/withastro/rosie/archive/refs/tags/v${VERSION}.tar.gz\"|" Formula/rosie.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Formula/rosie.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/rosie.rb
          git commit -m "Update rosie to v${VERSION}"
          git push

      - name: Generate AUR PKGBUILD
        env:
          VERSION: ${{ needs.create-release.outputs.version }}
          SHA256: ${{ needs.create-release.outputs.sha256 }}
        run: |
          sed -e "s/\${VERSION}/$VERSION/g" -e "s/\${SHA256}/$SHA256/g" aur/PKGBUILD > aur/PKGBUILD.gen
          mv aur/PKGBUILD.gen aur/PKGBUILD
          cat aur/PKGBUILD

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@da03e160361ce01bf087e790b6ffd196d7dccff7 # v4.1.3
        with:
          pkgname: rosie
          pkgbuild: ./aur/PKGBUILD
          commit_username: matthewp
          commit_email: matthew@matthewphillips.info
          ssh_private_key: ${{ secrets.AUR_SSH_KEY }}
          commit_message: "Update to v${{ needs.create-release.outputs.version }}"

  freebsd:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Checkout gh-pages branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: gh-pages
          path: pages

      - name: Build package in FreeBSD VM
        env:
          VERSION: ${{ needs.create-release.outputs.version }}
        uses: vmactions/freebsd-vm@d1e65811565151536c0c894fff74f06351ed26e6 # v1
        with:
          release: "14.2"
          usesh: true
          envs: 'VERSION'
          prepare: |
            pkg install -y rust
          run: |
            cargo build --release
            cp target/release/rosie rosie
            ./freebsd-package/build-package.sh "$VERSION"
            mkdir -p pages/freebsd/All
            cp "rosie-${VERSION}.pkg" pages/freebsd/All/
            pkg repo pages/freebsd

      - name: Upload .pkg to GitHub Release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v1
        with:
          files: rosie-${{ needs.create-release.outputs.version }}.pkg

      - name: Commit and push gh-pages
        env:
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          cd pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add freebsd/
          git commit -m "Publish rosie v${VERSION} for FreeBSD"
          # Rebase to pick up any concurrent push from debian-publish (different subdir, no conflict)
          git pull --rebase origin gh-pages
          git push

  debian-build:
    needs: create-release
    strategy:
      matrix:
        include:
          - codename: jammy
            runner: ubuntu-22.04
          - codename: noble
            runner: ubuntu-24.04
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1

      - name: Build rosie
        run: |
          cargo build --release
          cp target/release/rosie rosie

      - name: Build .deb
        # The Rust binary is self-contained (rustls statically linked), so the
        # debian package no longer needs runtime deps on libcurl/libarchive.
        env:
          VERSION: ${{ needs.create-release.outputs.version }}
          CODENAME: ${{ matrix.codename }}
        run: ./debian/build-package.sh "$VERSION" "$CODENAME"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: deb-${{ matrix.codename }}
          path: rosie_*.deb

  debian-publish:
    needs: [create-release, debian-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: gh-pages
          path: pages

      - name: Download all .debs
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: debs/
          pattern: deb-*
          merge-multiple: true

      - name: Install apt-utils
        run: sudo apt-get update && sudo apt-get install -y apt-utils

      - name: Build apt repo
        run: |
          set -e
          mkdir -p pages/debian
          cd pages/debian
          for CODENAME in jammy noble; do
            mkdir -p "pool/$CODENAME"
            cp ../../debs/rosie_*~${CODENAME}1_amd64.deb "pool/$CODENAME/"
          done
          for CODENAME in jammy noble; do
            DIST_DIR="dists/$CODENAME/main/binary-amd64"
            mkdir -p "$DIST_DIR"
            apt-ftparchive packages "pool/$CODENAME" > "$DIST_DIR/Packages"
            gzip -kf "$DIST_DIR/Packages"
            apt-ftparchive \
              -o APT::FTPArchive::Release::Origin=rosie \
              -o APT::FTPArchive::Release::Label=rosie \
              -o APT::FTPArchive::Release::Suite="$CODENAME" \
              -o APT::FTPArchive::Release::Codename="$CODENAME" \
              -o APT::FTPArchive::Release::Architectures=amd64 \
              -o APT::FTPArchive::Release::Components=main \
              release "dists/$CODENAME" > "dists/$CODENAME/Release"
          done

      - name: Upload .debs to GitHub Release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v1
        with:
          files: debs/*.deb

      - name: Commit and push gh-pages
        env:
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          cd pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add debian/
          git commit -m "Publish rosie v${VERSION} for Debian/Ubuntu"
          # Rebase to pick up any concurrent push from freebsd job (different subdir, no conflict)
          git pull --rebase origin gh-pages
          git push

  npm-publish:
    needs: [create-release]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Set version
        run: |
          cd npm/rosie-skills
          npm version "${{ needs.create-release.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Build the pure-JS package
        # The package ships dist/, produced from src/ via tsc. This also catches
        # type errors before publish.
        run: cd npm/rosie-skills && npm install && npm run build

      - name: Publish main package
        run: cd npm/rosie-skills && npm publish
