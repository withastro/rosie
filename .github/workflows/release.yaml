name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      sha256: ${{ steps.sha256.outputs.sha256 }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true

      - name: Calculate source tarball SHA256
        id: sha256
        run: |
          sleep 5
          curl -sL "https://github.com/${{ github.repository }}/archive/refs/tags/v${{ steps.version.outputs.version }}.tar.gz" -o source.tar.gz
          sha256=$(sha256sum source.tar.gz | cut -d' ' -f1)
          echo "sha256=$sha256" >> $GITHUB_OUTPUT
          echo "SHA256: $sha256"

  homebrew-and-aur:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update Homebrew formula
        env:
          VERSION: ${{ needs.create-release.outputs.version }}
          SHA256: ${{ needs.create-release.outputs.sha256 }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/matthewp/homebrew-rosie.git tap
          cd tap

          sed -i "s|url \"https://github.com/matthewp/rosie/archive/refs/tags/v.*\.tar\.gz\"|url \"https://github.com/matthewp/rosie/archive/refs/tags/v${VERSION}.tar.gz\"|" Formula/rosie.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Formula/rosie.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/rosie.rb
          git commit -m "Update rosie to v${VERSION}"
          git push

      - name: Generate AUR PKGBUILD
        env:
          VERSION: ${{ needs.create-release.outputs.version }}
          SHA256: ${{ needs.create-release.outputs.sha256 }}
        run: |
          sed -e "s/\${VERSION}/$VERSION/g" -e "s/\${SHA256}/$SHA256/g" aur/PKGBUILD > aur/PKGBUILD.gen
          mv aur/PKGBUILD.gen aur/PKGBUILD
          cat aur/PKGBUILD

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        with:
          pkgname: rosie
          pkgbuild: ./aur/PKGBUILD
          commit_username: matthewp
          commit_email: matthew@matthewphillips.info
          ssh_private_key: ${{ secrets.AUR_SSH_KEY }}
          commit_message: "Update to v${{ needs.create-release.outputs.version }}"

  freebsd:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: pages

      - name: Build package in FreeBSD VM
        env:
          VERSION: ${{ needs.create-release.outputs.version }}
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.2"
          usesh: true
          envs: 'VERSION'
          prepare: |
            pkg install -y pkgconf curl libarchive gmake
          run: |
            gmake CC=cc release
            ./freebsd-package/build-package.sh "$VERSION"
            mkdir -p pages/freebsd/All
            cp "rosie-${VERSION}.pkg" pages/freebsd/All/
            pkg repo pages/freebsd

      - name: Upload .pkg to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: rosie-${{ needs.create-release.outputs.version }}.pkg

      - name: Upload rosie binary for npm
        uses: actions/upload-artifact@v4
        with:
          name: rosie-freebsd-x64
          path: rosie

      - name: Commit and push gh-pages
        run: |
          cd pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add freebsd/
          git commit -m "Publish rosie v${{ needs.create-release.outputs.version }} for FreeBSD"
          # Rebase to pick up any concurrent push from debian-publish (different subdir, no conflict)
          git pull --rebase origin gh-pages
          git push

  debian-build:
    needs: create-release
    strategy:
      matrix:
        include:
          - codename: jammy
            runner: ubuntu-22.04
            libcurl: libcurl4
          - codename: noble
            runner: ubuntu-24.04
            libcurl: libcurl4t64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libarchive-dev pkg-config

      - name: Build rosie
        run: make release

      - name: Build .deb
        run: ./debian/build-package.sh "${{ needs.create-release.outputs.version }}" "${{ matrix.codename }}" "${{ matrix.libcurl }}"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.codename }}
          path: rosie_*.deb

  debian-publish:
    needs: [create-release, debian-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: pages

      - name: Download all .debs
        uses: actions/download-artifact@v4
        with:
          path: debs/
          pattern: deb-*
          merge-multiple: true

      - name: Install apt-utils
        run: sudo apt-get update && sudo apt-get install -y apt-utils

      - name: Build apt repo
        run: |
          set -e
          mkdir -p pages/debian
          cd pages/debian
          for CODENAME in jammy noble; do
            mkdir -p "pool/$CODENAME"
            cp ../../debs/rosie_*~${CODENAME}1_amd64.deb "pool/$CODENAME/"
          done
          for CODENAME in jammy noble; do
            DIST_DIR="dists/$CODENAME/main/binary-amd64"
            mkdir -p "$DIST_DIR"
            apt-ftparchive packages "pool/$CODENAME" > "$DIST_DIR/Packages"
            gzip -kf "$DIST_DIR/Packages"
            apt-ftparchive \
              -o APT::FTPArchive::Release::Origin=rosie \
              -o APT::FTPArchive::Release::Label=rosie \
              -o APT::FTPArchive::Release::Suite="$CODENAME" \
              -o APT::FTPArchive::Release::Codename="$CODENAME" \
              -o APT::FTPArchive::Release::Architectures=amd64 \
              -o APT::FTPArchive::Release::Components=main \
              release "dists/$CODENAME" > "dists/$CODENAME/Release"
          done

      - name: Upload .debs to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: debs/*.deb

      - name: Commit and push gh-pages
        run: |
          cd pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add debian/
          git commit -m "Publish rosie v${{ needs.create-release.outputs.version }} for Debian/Ubuntu"
          # Rebase to pick up any concurrent push from freebsd job (different subdir, no conflict)
          git pull --rebase origin gh-pages
          git push

  npm-binary-linux-x64:
    needs: create-release
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libarchive-dev pkg-config

      - name: Build rosie
        run: make release

      - name: Upload rosie binary for npm
        uses: actions/upload-artifact@v4
        with:
          name: rosie-linux-x64
          path: rosie

  npm-binary-darwin-arm64:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install libarchive (headers + static lib)
        # macOS SDK ships curl.h + libcurl.dylib but not libarchive. Use brew
        # for the headers and the .a, link libarchive statically so the binary
        # has no Homebrew runtime dep. libcurl stays dynamic against system.
        run: brew install libarchive

      - name: Build rosie with static libarchive
        run: |
          PFX="$(brew --prefix libarchive)"
          STATIC_LIBS="$(PKG_CONFIG_PATH=$PFX/lib/pkgconfig pkg-config --static --libs libarchive | sed "s|-larchive|$PFX/lib/libarchive.a|")"
          make release \
            CFLAGS="-O2 -I$PFX/include -Wall -Wextra -pedantic -std=c99 -D_POSIX_C_SOURCE=200809L -D_DEFAULT_SOURCE -D_DARWIN_C_SOURCE" \
            LDFLAGS="-lcurl $STATIC_LIBS"

      - name: Verify binary has no Homebrew dependencies
        run: |
          if otool -L rosie | grep -qE '/opt/homebrew|/usr/local/Cellar'; then
            echo "ERROR: binary links against Homebrew libs — not portable"
            otool -L rosie
            exit 1
          fi
          otool -L rosie

      - name: Upload rosie binary for npm
        uses: actions/upload-artifact@v4
        with:
          name: rosie-darwin-arm64
          path: rosie

  npm-publish:
    needs: [create-release, npm-binary-linux-x64, npm-binary-darwin-arm64, freebsd]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Download linux-x64 binary
        uses: actions/download-artifact@v4
        with:
          name: rosie-linux-x64
          path: npm/rosie-skills-linux-x64/bin

      - name: Download darwin-arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: rosie-darwin-arm64
          path: npm/rosie-skills-darwin-arm64/bin

      - name: Download freebsd-x64 binary
        uses: actions/download-artifact@v4
        with:
          name: rosie-freebsd-x64
          path: npm/rosie-skills-freebsd-x64/bin

      - name: Make binaries executable
        run: chmod +x npm/rosie-skills-*/bin/rosie

      - name: Set versions across all packages
        env:
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          for dir in rosie-skills rosie-skills-linux-x64 rosie-skills-darwin-arm64 rosie-skills-freebsd-x64; do
            (cd "npm/$dir" && npm version "$VERSION" --no-git-tag-version --allow-same-version)
          done
          node -e "
            const fs = require('fs');
            const p = 'npm/rosie-skills/package.json';
            const j = JSON.parse(fs.readFileSync(p, 'utf8'));
            for (const k of Object.keys(j.optionalDependencies || {})) {
              j.optionalDependencies[k] = process.env.VERSION;
            }
            fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n');
          "

      - name: Publish platform packages
        run: |
          for dir in rosie-skills-linux-x64 rosie-skills-darwin-arm64 rosie-skills-freebsd-x64; do
            (cd "npm/$dir" && npm publish)
          done

      - name: Publish main package
        run: cd npm/rosie-skills && npm publish
