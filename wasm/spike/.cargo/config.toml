[build]
target = "wasm32-wasip1"

# Force-export the symbols needed to drive a wasi-reactor flow from Node's
# WASI module:
#   - __wasm_call_ctors: wasi-libc's startup constructors (fd table init,
#     locale, etc). Without it, std::fs hits unmapped memory.
#   - _initialize: present so Node's wasi.initialize(instance) call
#     dispatches into the wasm. Our `_initialize` is provided in Rust as a
#     no-op that simply calls __wasm_call_ctors. Together these give the
#     WASI module a chance to bind its memory reference before any std::fs
#     calls reach it.
[target.wasm32-wasip1]
rustflags = [
    "-C", "link-arg=--export=__wasm_call_ctors",
    "-C", "link-arg=--export=_initialize",
]
